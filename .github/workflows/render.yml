name: Render Carousel

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm init -y

      - run: npm install playwright

      - run: npx playwright install chromium

      - run: node capture.js

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
